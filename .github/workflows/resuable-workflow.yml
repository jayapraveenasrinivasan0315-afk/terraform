name: Reusable Deploy Workflow

on:
  workflow_call:
    inputs:
      environment:
        default: development
        type: string
      deployment_type:
        required: true
        type: string
      app_path:
        required: true
        type: string
      app_name:
        required: true
        type: string
      artifact_name:
        required: true
        type: string
      region:
        default: asia-south1
        type: string
      artifact_repo:
        required: false
        type: string
        default: backend-repo
      GCS_BUCKET_NAME:
        required: false
        type: string
    secrets:
      GCP_PROJECT_ID:
        required: true
      GCP_SERVICE_ACCOUNT:
        required: true
      WORKLOAD_IDENTITY_PROVIDER:
        required: true
      API_BASE_URL:
        required: false
      FRONTEND_URL:
        required: false

permissions:
  contents: read
  id-token: write
  security-events: write

concurrency:
  group: deploy-${{ inputs.app_name }}-${{ inputs.environment }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate deployment type
        env:
          DEPLOYMENT_TYPE: ${{ inputs.deployment_type }}
        run: |
          if [ "$DEPLOYMENT_TYPE" != "frontend" ] && [ "$DEPLOYMENT_TYPE" != "backend" ]; then
            echo "Invalid deployment type"
            exit 1
          fi

      - name: Validate app path
        env:
          APP_PATH: ${{ inputs.app_path }}
        run: |
          if [ ! -d "$APP_PATH" ]; then
            echo "App path not found"
            exit 1
          fi

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan --config=p/default --sarif --output=semgrep.sarif
        continue-on-error: true

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: sast
        continue-on-error: true

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        if: inputs.deployment_type == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        if: inputs.deployment_type == 'frontend'
        working-directory: ${{ inputs.app_path }}
        run: npm ci

      - name: Run npm audit
        if: inputs.deployment_type == 'frontend'
        working-directory: ${{ inputs.app_path }}
        run: npm audit --audit-level=critical

      - name: Build frontend
        if: inputs.deployment_type == 'frontend'
        working-directory: ${{ inputs.app_path }}
        env:
          VITE_BASE_PATH: https://storage.googleapis.com/${{ inputs.GCS_BUCKET_NAME }}/
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL }}
          NODE_ENV: dev
        run: |
          echo "🏗️ Building frontend..."
          echo "  VITE_BASE_PATH: $VITE_BASE_PATH"
          echo "  VITE_API_BASE_URL: ${VITE_API_BASE_URL:-using fallback from .env.production}"
          echo "  NODE_ENV: $NODE_ENV"
          npm run build
          echo "✅ Frontend build complete"

      - name: Debug dist output
        if: inputs.deployment_type == 'frontend'
        run: find ${{ inputs.app_path }}/dist -type f | sort

      - name: Upload frontend build artifact
        if: inputs.deployment_type == 'frontend'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.app_path }}/dist
          retention-days: 1

      - name: Set up Docker Buildx
        if: inputs.deployment_type == 'backend'
        uses: docker/setup-buildx-action@v3

      - name: Build and export backend Docker image
        if: inputs.deployment_type == 'backend'
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.app_path }}
          tags: |
            ${{ inputs.app_name }}:${{ github.sha }}
            ${{ inputs.app_name }}:latest
          load: true
          push: false
          outputs: type=docker,dest=/tmp/${{ inputs.app_name }}.tar

      - name: Load Docker image from tar
        if: inputs.deployment_type == 'backend'
        env:
          APP_NAME: ${{ inputs.app_name }}
        run: docker load --input /tmp/$APP_NAME.tar

      - name: Verify image loaded
        if: inputs.deployment_type == 'backend'
        run: docker images | grep ${{ inputs.app_name }}
      - name: Run Trivy scan (readable report)
        if: inputs.deployment_type == 'backend'
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ inputs.app_name }}:${{ github.sha }}
          format: sarif
          output: trivy-report.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          skip-version-check: true
      - name: Upload Trivy report
        if: inputs.deployment_type == 'backend'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.sarif
          retention-days: 2
      - name: Upload backend build artifact
        if: inputs.deployment_type == 'backend'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: /tmp/${{ inputs.app_name }}.tar
          retention-days: 1

  setup-cloud-sql:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: inputs.deployment_type == 'backend'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set GCP Project
        run: gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

      - name: Enable Cloud SQL Admin API
        run: |
          gcloud services enable sqladmin.googleapis.com --quiet || true

      - name: Create or verify Cloud SQL instance
        env:
          INSTANCE_NAME: myapp-sql-instance
          REGION: asia-south1
        run: |
          if gcloud sql instances describe $INSTANCE_NAME --region=$REGION &>/dev/null; then
            echo "✅ Cloud SQL instance already exists"
          else
            echo "🚀 Creating Cloud SQL instance..."
            gcloud sql instances create $INSTANCE_NAME \
              --database-version=POSTGRES_15 \
              --tier=db-f1-micro \
              --region=$REGION \
              --no-backup \
              --availability-type=ZONAL \
              --quiet
            echo "✅ Cloud SQL instance created"
          fi

      - name: Create database
        env:
          INSTANCE_NAME: myapp-sql-instance
        run: |
          if gcloud sql databases describe myapp --instance=$INSTANCE_NAME &>/dev/null; then
            echo "✅ Database already exists"
          else
            echo "🚀 Creating database..."
            gcloud sql databases create myapp --instance=$INSTANCE_NAME --quiet
            echo "✅ Database created"
          fi

      - name: Create database user
        env:
          INSTANCE_NAME: myapp-sql-instance
          DB_USER: appuser
        run: |
          # Generate a secure random password
          DB_PASSWORD=$(openssl rand -base64 32)
          
          # Try to delete existing user (ignore if doesn't exist)
          gcloud sql users delete $DB_USER --instance=$INSTANCE_NAME --quiet 2>/dev/null || true
          
          # Create new user
          gcloud sql users create $DB_USER \
            --instance=$INSTANCE_NAME \
            --password=$DB_PASSWORD \
            --quiet
          
          # Store password in GCP Secret Manager
          echo -n "$DB_PASSWORD" | gcloud secrets create cloudsql-db-password \
            --data-file=- \
            --replication-policy="automatic" \
            --quiet 2>/dev/null || \
          echo -n "$DB_PASSWORD" | gcloud secrets versions add cloudsql-db-password \
            --data-file=- \
            --quiet
          
          echo "✅ Database user created and password stored in Secret Manager"

  deploy:
    needs: [build, setup-cloud-sql]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.setup-cloud-sql.result == 'success' || needs.setup-cloud-sql.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ./build-output

      - name: Debug build output
        if: inputs.deployment_type == 'frontend'
        run: find ./build-output -type f | sort

      - name: Load Docker image
        if: inputs.deployment_type == 'backend'
        env:
          APP_NAME: ${{ inputs.app_name }}
        run: docker load --input ./build-output/$APP_NAME.tar

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Set GCP Project  
        run: gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

      - name: Retrieve Cloud SQL password from Secret Manager
        if: inputs.deployment_type == 'backend'
        run: |
          DB_PASSWORD=$(gcloud secrets versions access latest --secret=cloudsql-db-password 2>/dev/null || echo "")
          if [ -z "$DB_PASSWORD" ]; then
            echo "⚠️  Cloud SQL password not found in Secret Manager, will use DATABASE_PASSWORD secret"
          else
            echo "DATABASE_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV
          fi

      - name: Deploy frontend to Google Cloud Storage
        if: inputs.deployment_type == 'frontend'
        run: |
          gsutil -m cp -r ./build-output/* gs://${{ inputs.GCS_BUCKET_NAME }}/

      - name: Verify GCS upload
        if: inputs.deployment_type == 'frontend'
        run: |
          echo "Files in GCS bucket:"
          gsutil ls -r gs://${{ inputs.GCS_BUCKET_NAME }}/

      - name: Authenticate Docker to Artifact Registry
        if: inputs.deployment_type == 'backend'
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Build & Push Docker image
        if: inputs.deployment_type == 'backend'
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.app_path }}
          tags: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ inputs.artifact_repo }}/${{ inputs.app_name }}:${{ github.sha }}
          push: true

      - name: Deploy to Cloud Run
        if: inputs.deployment_type == 'backend'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ inputs.app_name }}
          image: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ inputs.artifact_repo }}/${{ inputs.app_name }}:${{ github.sha }}
          region: ${{ inputs.region }}
          env_vars: |
            DATABASE_URL=postgresql://appuser:${{ env.DATABASE_PASSWORD || secrets.DATABASE_PASSWORD }}@//myapp?host=/cloudsql/${{ secrets.GCP_PROJECT_ID }}:asia-south1:myapp-sql-instance
            DB_NAME=myapp
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            API_BASE_URL=${{ secrets.API_BASE_URL }}