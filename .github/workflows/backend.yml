name: Deploy to GCP (Frontend + Backend)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment (e.g., staging, production)'
        required: true
        default: 'dev'

env:
  PROJECT_ID: gwx-devops-internship
  REGION: asia-south1
  ARTIFACT_REGISTRY_REPO: backend-repo
  ARTIFACT_REGISTRY_LOCATION: asia-south1
  GCS_FRONTEND_BUCKET: gw-devops-frontend-bucket
  CLOUD_RUN_SERVICE: backend-service
  SQL_INSTANCE: myapp-sql-instance
  DB_NAME: myapp
  DB_USER: myapp_user
  CONTAINER_PORT: 8080

jobs:
  # ============================================================
  # JOB 1: Build & Deploy Frontend to GCS
  # ============================================================
  deploy-frontend:
    name: Deploy Frontend to GCS
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
       

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy frontend to GCS
        run: |
          gsutil -m rsync -r -d frontend/dist gs://${{ env.GCS_FRONTEND_BUCKET }}/
          gsutil -h "Cache-Control:no-cache" -m cp gs://${{ env.GCS_FRONTEND_BUCKET }}/index.html gs://${{ env.GCS_FRONTEND_BUCKET }}/index.html

      - name: Clear GCS cache
        run: |
          gsutil defacl ch -u AllUsers:R gs://${{ env.GCS_FRONTEND_BUCKET }} || true
          echo "Frontend deployed to: https://${{ env.GCS_FRONTEND_BUCKET }}"

  # ============================================================
  # JOB 2: Build & Push Docker Image to Artifact Registry
  # ============================================================
  build-and-push-backend:
    name: Build & Push Backend Docker Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev

      - name: Build Docker image
        working-directory: ./backend
        run: |
          docker build -t ${{ env.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/backend:${{ github.sha }} \
                       -t ${{ env.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/backend:latest .

      - name: Push Docker image to Artifact Registry
        run: |
          docker push ${{ env.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/backend:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/backend:latest

      - name: Set image output
        id: image
        run: echo "image=${{ env.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/backend:${{ github.sha }}" >> $GITHUB_OUTPUT

  # ============================================================
  # JOB 3: Create/Update Cloud SQL Instance & Database
  # ============================================================
  setup-cloud-sql:
    name: Setup Cloud SQL
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Create Cloud SQL instance (if not exists)
        run: |
          INSTANCE_EXISTS=$(gcloud sql instances describe ${{ env.SQL_INSTANCE }} --project=${{ env.PROJECT_ID }} 2>/dev/null || echo "")
          if [ -z "$INSTANCE_EXISTS" ]; then
            echo "Creating Cloud SQL instance..."
            gcloud sql instances create ${{ env.SQL_INSTANCE }} \
              --database-version=POSTGRES_15 \
              --tier=db-f1-micro \
              --region=${{ env.REGION }} \
              --availability-type=REGIONAL \
              --enable-bin-log \
              --backup-start-time=03:00 \
              --project=${{ env.PROJECT_ID }}
            echo "Waiting for instance to be ready..."
            sleep 30
          else
            echo "Cloud SQL instance already exists"
          fi

      - name: Create database (if not exists)
        run: |
          gcloud sql databases create ${{ env.DB_NAME }} \
            --instance=${{ env.SQL_INSTANCE }} \
            --project=${{ env.PROJECT_ID }} \
            || echo "Database already exists"

      - name: Create database user (if not exists)
        run: |
          gcloud sql users create ${{ env.DB_USER }} \
            --instance=${{ env.SQL_INSTANCE }} \
            --password=${{ secrets.DB_PASSWORD }} \
            --project=${{ env.PROJECT_ID }} \
            || echo "User already exists"

      - name: Get Cloud SQL connection name
        id: sql-conn
        run: |
          CONN_NAME=$(gcloud sql instances describe ${{ env.SQL_INSTANCE }} --project=${{ env.PROJECT_ID }} --format='value(connectionName)')
          echo "connection_name=${CONN_NAME}" >> $GITHUB_OUTPUT

  # ============================================================
  # JOB 4: Create GCP Secrets
  # ============================================================
  create-secrets:
    name: Create GCP Secrets
    runs-on: ubuntu-latest
    needs: setup-cloud-sql

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Get Cloud SQL connection name
        id: sql-conn
        run: |
          CONN_NAME=$(gcloud sql instances describe ${{ env.SQL_INSTANCE }} --project=${{ env.PROJECT_ID }} --format='value(connectionName)')
          echo "connection_name=${CONN_NAME}" >> $GITHUB_OUTPUT

      - name: Create DATABASE_URL secret
        run: |
          DB_URL="postgresql://${{ env.DB_USER }}:${{ secrets.DB_PASSWORD }}@/${{ env.DB_NAME }}?host=/cloudsql/${{ steps.sql-conn.outputs.connection_name }}"
          echo -n "$DB_URL" | gcloud secrets create db-url \
            --data-file=- \
            --project=${{ env.PROJECT_ID }} \
            --replication-policy="user-managed" \
            --locations=${{ env.REGION }} \
            2>/dev/null || (echo -n "$DB_URL" | gcloud secrets versions add db-url --data-file=- --project=${{ env.PROJECT_ID }})

      - name: Grant Cloud Run service account access to secret
        run: |
          SA_EMAIL=$(gcloud iam service-accounts list --filter="displayName:cloud-run-sa" --format='value(email)' --project=${{ env.PROJECT_ID }} || echo "")
          if [ -n "$SA_EMAIL" ]; then
            gcloud secrets add-iam-policy-binding db-url \
              --member=serviceAccount:$SA_EMAIL \
              --role=roles/secretmanager.secretAccessor \
              --project=${{ env.PROJECT_ID }}
          fi

  # ============================================================
  # JOB 5: Deploy to Cloud Run
  # ============================================================
  deploy-cloud-run:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [build-and-push-backend, create-secrets]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Get Cloud SQL connection name
        id: sql-conn
        run: |
          CONN_NAME=$(gcloud sql instances describe ${{ env.SQL_INSTANCE }} --project=${{ env.PROJECT_ID }} --format='value(connectionName)')
          echo "connection_name=${CONN_NAME}" >> $GITHUB_OUTPUT

      - name: Create or Update Cloud Run Service
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image=${{ needs.build-and-push-backend.outputs.image }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --port=${{ env.CONTAINER_PORT }} \
            --memory=512Mi \
            --cpu=1 \
            --timeout=3600 \
            --max-instances=100 \
            --min-instances=1 \
            --set-cloudsql-instances=${{ steps.sql-conn.outputs.connection_name }} \
            --set-env-vars="DATABASE_URL=postgresql://${{ env.DB_USER }}:${{ secrets.DB_PASSWORD }}@/${{ env.DB_NAME }}?host=/cloudsql/${{ steps.sql-conn.outputs.connection_name }}" \
            --project=${{ env.PROJECT_ID }}

      - name: Get Cloud Run Service URL
        id: service
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "url=${SERVICE_URL}" >> $GITHUB_OUTPUT

      - name: Print deployment info
        run: |
          echo "✅ Deployment Complete!"
          echo "🌐 Cloud Run Service: ${{ steps.service.outputs.url }}"
          echo "📦 Docker Image: ${{ needs.build-and-push-backend.outputs.image }}"
          echo "🗄️  Cloud SQL Instance: ${{ env.SQL_INSTANCE }}"
          echo "📝 Database: ${{ env.DB_NAME }}"

  # ============================================================
  # JOB 6: Health Check
  # ============================================================
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy-cloud-run
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Get Cloud Run Service URL
        id: service
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "url=${SERVICE_URL}" >> $GITHUB_OUTPUT

      - name: Wait for service to be ready
        run: sleep 10

      - name: Health check
        run: |
          for i in {1..5}; do
            echo "Attempt $i/5..."
            if curl -f -s "${{ steps.service.outputs.url }}/docs" > /dev/null 2>&1; then
              echo "✅ Service is healthy!"
              exit 0
            fi
            if [ $i -lt 5 ]; then
              sleep 15
            fi
          done
          echo "⚠️ Service health check inconclusive, but deployment completed"
          exit 0
